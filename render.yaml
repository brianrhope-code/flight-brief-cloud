services:
  - type: web
    name: flight-brief-cloud
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python -u desktop_flight_brief_server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: FLIGHT_BRIEF_CLOUD_MODE
        value: "true"
      - key: FLIGHT_BRIEF_OUTPUT_DIR
        value: /tmp/flight-brief-output
      - key: PYTHONUNBUFFERED
        value: "1"
