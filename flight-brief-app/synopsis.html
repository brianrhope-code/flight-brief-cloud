<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flight Brief" />
    <meta name="theme-color" content="#071f3f" />
    <title>Flight Brief Viewer</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #102033;
        --muted: #667587;
        --navy: #071f3f;
        --blue: #0f5e99;
        --green: #12805c;
        --amber: #b17612;
        --line: rgba(212, 219, 227, 0.9);
        --paper: #f5f8fb;
        --glass: rgba(255, 255, 255, 0.9);
        --shadow: 0 18px 42px rgba(8, 25, 44, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 18% 0%, rgba(15, 94, 153, 0.22), transparent 30rem),
          linear-gradient(135deg, #071f3f 0%, #0c355e 38%, #eaf0f6 38.2%, #eef2f6 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        min-height: 100svh;
        padding: max(12px, env(safe-area-inset-top)) 12px max(14px, env(safe-area-inset-bottom));
      }

      .shell {
        min-height: calc(100svh - max(12px, env(safe-area-inset-top)) - max(14px, env(safe-area-inset-bottom)));
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
      }

      .command {
        position: sticky;
        top: max(8px, env(safe-area-inset-top));
        z-index: 3;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 18px;
        background: var(--glass);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        animation: lift 340ms ease-out both;
      }

      .runway {
        height: 7px;
        background:
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.95) 0 28px, transparent 28px 50px),
          linear-gradient(90deg, var(--navy), var(--blue));
      }

      .bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px;
      }

      .identity {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .eyebrow {
        color: var(--blue);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--navy);
        font-size: clamp(22px, 4vw, 34px);
        line-height: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sub {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.25;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex: 0 0 auto;
      }

      a,
      button {
        min-height: 46px;
        border: 0;
        border-radius: 13px;
        padding: 12px 14px;
        background: #edf2f6;
        color: var(--navy);
        font: inherit;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
        transition:
          transform 140ms ease,
          background 140ms ease,
          box-shadow 140ms ease;
      }

      a:active,
      button:active {
        transform: scale(0.97);
      }

      .primary {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 9px 18px rgba(15, 94, 153, 0.22);
      }

      .viewer-shell {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
        animation: rise 420ms 90ms ease-out both;
      }

      .hint-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 13px;
        border: 1px solid rgba(255, 255, 255, 0.52);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--muted);
        font-size: 13px;
        backdrop-filter: blur(12px);
      }

      .hint-strip strong {
        color: var(--navy);
      }

      .chip {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 6px 10px;
        background: rgba(18, 128, 92, 0.1);
        color: var(--green);
        font-size: 12px;
        font-weight: 900;
      }

      .frame-wrap {
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 18px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        min-height: calc(100svh - 178px - env(safe-area-inset-top));
        border: 0;
        background: var(--paper);
      }

      .fallback {
        display: none;
        margin: 0;
        min-height: 52svh;
        place-items: center;
        padding: 22px;
        text-align: center;
        background: #fff;
      }

      .fallback p {
        margin: 0 0 14px;
        color: var(--muted);
      }

      .rotate {
        display: none;
        color: var(--amber);
        font-weight: 900;
      }

      @media (orientation: portrait) and (max-width: 720px) {
        .rotate {
          display: inline;
        }
      }

      @media (max-width: 620px) {
        body {
          padding-left: 8px;
          padding-right: 8px;
        }

        .bar {
          grid-template-columns: 1fr;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        a,
        button {
          text-align: center;
        }

        .hint-strip {
          align-items: flex-start;
          flex-direction: column;
        }
      }

      @keyframes lift {
        from {
          opacity: 0;
          transform: translateY(-10px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="command">
        <div class="runway" aria-hidden="true"></div>
        <div class="bar">
          <section class="identity" aria-label="Synopsis title">
            <div class="eyebrow">Gold Standard Viewer</div>
            <h1 id="title">Flight Brief Viewer</h1>
            <div class="sub">Back button stays here. <span class="rotate">Rotate for the wide view.</span></div>
          </section>
          <nav class="actions" aria-label="Synopsis actions">
            <button class="primary" type="button" id="back-btn">Back to app</button>
            <a href="#" id="pdf-link" target="_blank" rel="noopener">Open PDF</a>
          </nav>
        </div>
      </header>

      <section class="viewer-shell" aria-label="Synopsis viewer">
        <div class="hint-strip">
          <span><strong>Review flow:</strong> use Back to app when finished, or Open PDF for the raw document.</span>
          <span class="chip">Visual reference only</span>
        </div>
        <div class="frame-wrap">
          <iframe id="pdf-frame" title="Brief synopsis PDF"></iframe>
          <section class="fallback" id="fallback">
            <div>
              <p>The synopsis PDF is not available yet.</p>
              <a class="primary" href="./index.html">Back to app</a>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const rawPdf = params.get("pdf") || "";
      const titleText = params.get("title") || "Brief Synopsis";
      const pdfUrl = rawPdf ? new URL(rawPdf, window.location.href).href : "";
      const pdfFrame = document.getElementById("pdf-frame");
      const pdfLink = document.getElementById("pdf-link");
      const fallback = document.getElementById("fallback");

      document.title = titleText;
      document.getElementById("title").textContent = titleText;

      document.getElementById("back-btn").addEventListener("click", () => {
        window.location.href = "./";
      });

      if (pdfUrl) {
        pdfFrame.src = pdfUrl;
        pdfLink.href = pdfUrl;
      } else {
        pdfFrame.style.display = "none";
        pdfLink.style.display = "none";
        fallback.style.display = "grid";
      }
    </script>
  </body>
</html>
